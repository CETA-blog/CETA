<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="description" content="简约风格的个人博客，分享技术笔记与思考">
    <title>CETA | 个人博客</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background-color: #f8fafc;
            font-family: system-ui, -apple-system, 'Segoe UI', 'Roboto', 'Helvetica Neue', sans-serif;
            color: #1e293b;
            line-height: 1.5;
            padding: 2rem 1rem;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: 300px 1fr;
            gap: 2.5rem;
            align-items: start;
        }
        .sidebar {
            background: #ffffff;
            border-radius: 24px;
            padding: 1.8rem;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.02), 0 2px 4px rgba(0, 0, 0, 0.02);
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }
        .sidebar:hover {
            box-shadow: 0 12px 28px rgba(0, 0, 0, 0.05);
        }
        .avatar {
            width: 96px;
            height: 96px;
            background: linear-gradient(135deg, #e2e8f0, #cbd5e1);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 1.2rem;
            font-size: 2.8rem;
            font-weight: 500;
            color: #334155;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.02);
        }
        .blogger-name {
            font-size: 1.6rem;
            font-weight: 600;
            letter-spacing: -0.3px;
            margin-bottom: 0.5rem;
            color: #0f172a;
        }
        .blogger-bio {
            color: #475569;
            font-size: 0.9rem;
            margin-bottom: 1.4rem;
            line-height: 1.4;
            border-left: 3px solid #cbd5e1;
            padding-left: 0.75rem;
        }
        .social-links {
            display: flex;
            gap: 1.2rem;
            margin-top: 1rem;
            flex-wrap: wrap;
        }
        .social-links a {
            color: #5b6e8c;
            font-size: 1.3rem;
            transition: color 0.2s ease, transform 0.1s ease;
            text-decoration: none;
        }
        .social-links a:hover {
            color: #2563eb;
            transform: translateY(-2px);
        }
        .sidebar-divider {
            height: 1px;
            background: #e9edf2;
            margin: 1.5rem 0 1rem;
        }
        .sidebar-footer-text {
            font-size: 0.75rem;
            color: #94a3b8;
            text-align: center;
            margin-top: 1rem;
        }
        .content {
            background: transparent;
        }
        .section-title {
            font-size: 1.8rem;
            font-weight: 600;
            letter-spacing: -0.3px;
            margin-bottom: 1.8rem;
            color: #0f172a;
            display: inline-block;
            position: relative;
        }
        .section-title:after {
            content: '';
            display: block;
            width: 48px;
            height: 3px;
            background: #2563eb;
            border-radius: 6px;
            margin-top: 6px;
        }
        .articles-list {
            display: flex;
            flex-direction: column;
            gap: 1.8rem;
        }
        .post-card {
            background: #ffffff;
            border-radius: 20px;
            padding: 1.5rem 1.8rem;
            transition: all 0.25s ease;
            box-shadow: 0 1px 2px rgba(0, 0, 0, 0.03), 0 4px 12px rgba(0, 0, 0, 0.02);
            border: 1px solid #f0f2f5;
        }
        .post-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 12px 24px -8px rgba(0, 0, 0, 0.08);
            border-color: #e2e8f0;
        }
        .post-title {
            font-size: 1.45rem;
            font-weight: 600;
            margin-bottom: 0.5rem;
            line-height: 1.3;
        }
        .post-title a {
            text-decoration: none;
            color: #0f172a;
            transition: color 0.2s;
        }
        .post-title a:hover {
            color: #2563eb;
        }
        .post-meta {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 0.8rem;
            margin-bottom: 0.9rem;
            font-size: 0.8rem;
            color: #5b6e8c;
        }
        .post-date {
            display: inline-flex;
            align-items: center;
            gap: 0.3rem;
        }
        .post-date i {
            font-size: 0.75rem;
        }
        .post-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
        }
        .tag {
            background: #f1f5f9;
            padding: 0.2rem 0.7rem;
            border-radius: 30px;
            font-size: 0.7rem;
            font-weight: 450;
            color: #334155;
            letter-spacing: 0.2px;
            transition: background 0.1s;
        }
        .tag:hover {
            background: #e2e8f0;
        }
        .post-excerpt {
            color: #334155;
            font-size: 0.9rem;
            margin: 0.8rem 0 1rem 0;
            line-height: 1.5;
            display: -webkit-box;
            -webkit-line-clamp: 3;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
        .read-more {
            display: inline-flex;
            align-items: center;
            gap: 0.3rem;
            font-size: 0.85rem;
            font-weight: 500;
            color: #2563eb;
            text-decoration: none;
            border-bottom: 1px dashed transparent;
            transition: border-color 0.2s, gap 0.2s;
        }
        .read-more i {
            font-size: 0.75rem;
            transition: transform 0.2s;
        }
        .read-more:hover {
            gap: 0.5rem;
            border-bottom-color: #2563eb;
        }
        .footer {
            max-width: 1200px;
            margin: 4rem auto 1rem;
            text-align: center;
            padding-top: 2rem;
            border-top: 1px solid #e2e8f0;
            color: #6c7a91;
            font-size: 0.8rem;
        }
        @media (max-width: 768px) {
            body {
                padding: 1.2rem;
            }
            .container {
                grid-template-columns: 1fr;
                gap: 1.8rem;
            }
            .sidebar {
                text-align: center;
            }
            .avatar {
                margin-left: auto;
                margin-right: auto;
            }
            .blogger-bio {
                text-align: left;
            }
            .social-links {
                justify-content: center;
            }
            .post-card {
                padding: 1.2rem;
            }
            .section-title {
                font-size: 1.6rem;
            }
        }
        @media (max-width: 480px) {
            .post-title {
                font-size: 1.25rem;
            }
        }
        .no-articles {
            background: white;
            border-radius: 20px;
            padding: 2rem;
            text-align: center;
            color: #5b6e8c;
        }
    </style>
</head>
<body>
<div class="container">
    <aside class="sidebar">
        <div class="avatar">
            <i class="fas fa-feather-alt" style="font-size: 2.5rem; color: #334155;"></i>
        </div>
        <h1 class="blogger-name">CETA</h1>
        <div class="blogger-bio">
            前端开发 / 独立创作者。<br>
            记录技术与思考，热爱简约设计，探索代码美学。
        </div>
        <div class="social-links">
            <a href="https://github.com/CETA-blog" target="_blank" rel="noopener noreferrer" aria-label="GitHub" title="GitHub"><i class="fab fa-github"></i></a>
            <a href="https://m.bilibili.com/space?from=headline" target="_blank" rel="noopener noreferrer" aria-label="Bilibili" title="Bilibili"><i class="fab fa-bilibili"></i></a>
            <a href="javascript:void(0)" aria-label="Email" title="Email"><i class="fas fa-envelope"></i></a>
            <a href="javascript:void(0)" aria-label="RSS" title="RSS"><i class="fas fa-rss"></i></a>
        </div>
        <div class="sidebar-divider"></div>
        <div class="sidebar-footer-text">
            <i class="far fa-comment-dots"></i> 保持好奇 · 每日精进
        </div>
    </aside>
    <main class="content">
        <h2 class="section-title">最新消息</h2>
        <div id="articlesContainer" class="articles-list">
            <div class="no-articles">加载文章中...</div>
        </div>
    </main>
</div>
<footer class="footer">
    <p>© 2026 CETA | 个人博客</p>
    <p style="margin-top: 0.3rem; font-size: 0.7rem;">保持专注，写点东西</p>
</footer>
<script>
    const articlesData = [
        {
            id: 1,
            title: "前端工程化小记：从零搭建现代化工作流",
            date: "2025-03-15",
            excerpt: "效率即艺术。本文记录如何配置 ESLint + Prettier + Husky，打造规范舒适的开发环境，并提供可扩展的结构思考。",
            tags: ["工程化", "前端", "工具链"]
        },
        {
            id: 2,
            title: "CSS Grid 完全指南：告别传统布局焦虑",
            date: "2025-02-28",
            excerpt: "Grid 网格布局已成为现代 CSS 布局的核心武器。掌握 fr 单位与隐式网格，轻松构建复杂响应式界面，附实际案例。",
            tags: ["CSS", "Grid", "响应式"]
        },
        {
            id: 3,
            title: "JavaScript 异步编程进化史：回调 → Promise → async/await",
            date: "2025-02-10",
            excerpt: "异步模式是 JS 的精髓之一，从回调地狱到优雅的 async 函数，深入理解事件循环与错误处理最佳实践。",
            tags: ["JavaScript", "异步", "Promise"]
        },
        {
            id: 4,
            title: "设计简约个人博客——审美与功能的平衡",
            date: "2025-01-22",
            excerpt: "为什么要做这个博客？留白、排版、色彩对比和可读性，分享设计一个干净博客页面的心路历程与技术实现。",
            tags: ["设计", "UX", "博客"]
        },
        {
            id: 5,
            title: "写给未来的自己：坚持写作与知识沉淀",
            date: "2025-01-05",
            excerpt: "写作是一种再思考。聊聊技术写作带来的深度复盘与对社区的微弱回馈，鼓励更多开发者表达与分享。",
            tags: ["随笔", "成长", "思考"]
        }
    ];
    function formatDate(dateStr) {
        if (!dateStr) return '未知日期';
        const [year, month, day] = dateStr.split('-');
        return `${year}年${parseInt(month)}月${parseInt(day)}日`;
    }
    function renderArticles() {
        const container = document.getElementById('articlesContainer');
        if (!container) return;
        if (!articlesData || articlesData.length === 0) {
            container.innerHTML = '<div class="no-articles">暂无文章，敬请期待~</div>';
            return;
        }
        const articlesHTML = articlesData.map(article => {
            const tagsHtml = article.tags.map(tag => `<span class="tag">${escapeHtml(tag)}</span>`).join('');
            const displayDate = formatDate(article.date);
            return `
                <article class="post-card">
                    <h3 class="post-title">
                        <a href="javascript:void(0)" class="article-link" data-id="${article.id}" data-title="${escapeHtml(article.title)}">${escapeHtml(article.title)}</a>
                    </h3>
                    <div class="post-meta">
                        <span class="post-date"><i class="far fa-calendar-alt"></i> ${displayDate}</span>
                        <div class="post-tags">${tagsHtml}</div>
                    </div>
                    <p class="post-excerpt">${escapeHtml(article.excerpt)}</p>
                    <a href="javascript:void(0)" class="read-more" data-id="${article.id}" data-title="${escapeHtml(article.title)}">
                        阅读全文 <i class="fas fa-arrow-right"></i>
                    </a>
                </article>
            `;
        }).join('');
        container.innerHTML = articlesHTML;
        const allArticleLinks = document.querySelectorAll('.article-link, .read-more');
        allArticleLinks.forEach(link => {
            link.addEventListener('click', (e) => {
                e.preventDefault();
                const title = link.getAttribute('data-title') || '这篇文章';
                console.log(`✨ 演示模式: 点击了《${title}》，完整内容可后续扩展。`);
            });
        });
    }
    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        }).replace(/[\uD800-\uDBFF][\uDC00-\uDFFF]/g, function(c) {
            return c;
        });
    }
    document.addEventListener('DOMContentLoaded', () => {
        renderArticles();
        const socialIcons = document.querySelectorAll('.social-links a');
        socialIcons.forEach(icon => {
            icon.addEventListener('click', (e) => {
                const href = icon.getAttribute('href');
                if (href && href !== 'javascript:void(0)') {
                    return;
                }
                e.preventDefault();
                const iconElem = icon.querySelector('i');
                let platform = '社交链接';
                if (iconElem) {
                    if (iconElem.classList.contains('fa-envelope')) platform = '邮箱';
                    else if (iconElem.classList.contains('fa-rss')) platform = 'RSS订阅';
                    else if (iconElem.classList.contains('fa-github')) platform = 'GitHub';
                    else if (iconElem.classList.contains('fa-bilibili')) platform = 'Bilibili';
                    else platform = '社交平台';
                }
                console.log(` 社交链接演示: 点击了 ${platform}，个人真实链接可在此配置。`);
            });
        });
    });
</script>
</body>
</html>
